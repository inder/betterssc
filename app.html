<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BetterSSC</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <!-- LANDING — shown when no pub/post in URL params -->
    <div id="landing" class="landing hidden">
      <div class="landing-card">
        <h1>BetterSSC</h1>
        <p class="landing-tagline">A Discord-style client for Substack Chat.</p>
        <p id="landing-msg">
          To start, open a Substack chat in another tab — then click the
          BetterSSC icon again.
        </p>
        <div class="landing-actions">
          <a
            class="btn btn-primary"
            href="https://substack.com/chat"
            target="_blank"
            rel="noopener"
            >Open Substack inbox</a
          >
        </div>
      </div>
    </div>

    <!-- APP — main chat client -->
    <div id="app" class="app hidden">
      <header class="header">
        <button
          type="button"
          id="headerLeft"
          class="header-left"
          title="Show full post"
          aria-label="Show full post"
          aria-expanded="false"
        >
          <span class="header-avatar-slot" id="postAuthorAvatar"></span>
          <span class="header-left-text">
            <span class="pub-name" id="pubName">Loading…</span>
            <span class="post-title" id="postTitle"></span>
          </span>
          <svg
            class="post-body-caret"
            id="postBodyCaret"
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="2.25"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          ><polyline points="3.5 6 8 10.5 12.5 6"></polyline></svg>
        </button>
        <div class="header-right">
          <button
            id="aiInsightsBtn"
            type="button"
            class="header-btn ai-insights-btn"
            title="AI Insights — analyze visible chat"
            aria-label="AI Insights"
          >✨ AI</button>
          <div class="search-wrap">
            <input
              id="searchInput"
              type="text"
              placeholder="Search …  / focus · /help for commands · j/k nav"
              autocomplete="off"
            />
            <span id="searchCount" class="search-count"></span>
          </div>
          <button
            id="notifyAllBtn"
            class="header-btn icon-btn"
            title="Notify me on every new message (while tab is hidden)"
            aria-label="Notify on all new messages"
          ></button>
          <button
            id="refreshNow"
            class="header-btn icon-btn"
            title="Refresh now (r)"
            aria-label="Refresh"
          >⟳</button>
          <button
            id="themeToggle"
            class="theme-toggle"
            title="Toggle light / dark theme"
            aria-label="Toggle theme"
          >☀</button>
          <div
            id="wsStatus"
            class="ws-status"
            title="Live updates via 12s polling"
            aria-label="Connection status"
          >
            <span class="dot dot-idle"></span>
          </div>
          <span class="header-avatar-slot user-avatar-header" id="userAvatarSlot" title="You"></span>
        </div>
      </header>
      <div
        id="postModalBackdrop"
        class="post-modal-backdrop hidden"
        role="dialog"
        aria-modal="true"
        aria-labelledby="postModalTitle"
      >
        <div class="post-modal" id="postModal">
          <header class="post-modal-header">
            <h2 class="post-modal-title" id="postModalTitle">Post</h2>
            <button
              type="button"
              id="postModalClose"
              class="post-modal-close"
              title="Close (Esc)"
              aria-label="Close"
            >✕</button>
          </header>
          <div class="post-modal-meta" id="postModalMeta"></div>
          <div class="post-modal-body" id="postModalBody"></div>
        </div>
      </div>

      <main class="main">
        <section class="stream" id="stream">
          <div class="loading-banner hidden" id="historyLoading">
            Loading older messages…
          </div>
          <div id="messages" class="messages"></div>
          <div id="newMessageJump" class="new-message-jump hidden">
            <button type="button">↓ New messages</button>
          </div>
        </section>

        <aside class="members" id="members">
          <div class="members-header" id="membersHeader">Active</div>
          <ul id="memberList" class="member-list"></ul>
        </aside>
      </main>

      <div class="composer" id="composer">
        <div class="composer-reply hidden" id="composerReply">
          <span class="composer-reply-label" id="composerReplyLabel"></span>
          <button
            type="button"
            class="composer-reply-close"
            id="composerReplyClose"
            title="Cancel reply"
            aria-label="Cancel reply"
          >×</button>
        </div>
        <div class="composer-row">
          <textarea
            id="composerInput"
            class="composer-input"
            rows="1"
            placeholder="Send a message"
            autocomplete="off"
            spellcheck="true"
          ></textarea>
          <button
            type="button"
            id="composerSend"
            class="composer-send"
            disabled
            aria-label="Send message"
          >Send</button>
        </div>
        <div class="composer-mention hidden" id="composerMention" role="listbox"></div>
      </div>

      <footer class="footer">
        <span class="footer-note" id="footerNote"></span>
        <a
          id="openNativeChat"
          class="footer-link hidden"
          href="#"
          target="_blank"
          rel="noopener"
          >Open in Substack</a
        >
        <span class="footer-stats" id="footerStats"></span>
      </footer>
    </div>

    <script type="module" src="app.js"></script>
  </body>
</html>
